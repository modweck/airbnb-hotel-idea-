name: Release

# Triggered when you push a tag like v0.2.0, OR when you publish a
# GitHub Release through the web UI (which creates the tag for you).
#
# Beginner-friendly path:
#   1. Make sure main is green (CI passing).
#   2. On GitHub, click "Releases" -> "Draft a new release".
#   3. Choose tag "v0.2.0" -> Target: main -> Generate release notes.
#   4. Publish. This workflow runs.
#
# Power-user path:
#   git tag v0.2.0 && git push origin v0.2.0

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0). Leave blank when triggered by a tag push."
        required: false

permissions:
  contents: write

jobs:
  verify:
    name: verify build
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npx expo export --platform web

  deploy-web:
    name: deploy to Netlify
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify production build
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK_URL" ]; then
            echo "ERROR: Repo secret NETLIFY_BUILD_HOOK_URL is not set."
            echo "Create one in Netlify (Site settings -> Build & deploy -> Build hooks)"
            echo "and add it under GitHub Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          curl --fail-with-body -X POST -d '{}' "$NETLIFY_BUILD_HOOK_URL"
          echo "OK: Netlify build hook triggered."

  github-release:
    name: publish GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    # Only run for tag pushes; manual workflow_dispatch is for re-deploying without re-releasing.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
          else
            gh release create "$TAG" --generate-notes --title "$TAG"
          fi

  # Future iOS / App Store deploy job. Intentionally a stub so the
  # release flow already has a slot for it; fill in when iOS work begins
  # (Fastlane / EAS Submit / TestFlight via App Store Connect API key).
