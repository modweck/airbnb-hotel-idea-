[build]
  command = "npx expo export --platform web"
  publish = "dist/client"
  functions = "netlify/functions"

[functions]
  included_files = ["dist/server/**/*"]

# Expo Router server adapter handles all routes (static + /api/*) via one function.
# Static assets in dist/client are served before this redirect matches.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200

[dev]
  command = "npx expo start --web"
  port = 8888
  targetPort = 8081
